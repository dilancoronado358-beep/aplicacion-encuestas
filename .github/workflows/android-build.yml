name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor and Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
          npx cap init "Robles 2026" com.robles2026.encuesta --web-dir dist
          npx cap add android || echo "Android folder already exists or added"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Robles2026-Encuesta-Beta
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Robles 2026 - App v${{ github.run_number }}"
          body: "Descarga el APK para instalar la app de consulta ciudadana en Android."
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
